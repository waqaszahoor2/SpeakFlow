name: 🚀 Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  # Removed hardcoded version for stability

permissions:
  contents: write

jobs:
  build:
    name: 🏗️ Build Release APK
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🧹 Clean Build
        run: flutter clean

      - name: 🏗️ Build Debug APK
        run: flutter build apk --debug

      - name: 🏗️ Build Release APK (universal)
        run: flutter build apk --release

      - name: 🏗️ Build Release Bundle (AAB)
        run: flutter build appbundle --release

      - name: 📋 Get app version
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "App version: $VERSION"

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SpeakFlow-Builds-v${{ steps.version.outputs.version }}
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab

      - name: 🚀 Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: SpeakFlow v${{ steps.version.outputs.version }}
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
