name: SpeakFlow
description: AI-powered English Learning App — Practice speaking with your AI tutor
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # UI / Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  animated_text_kit: ^4.2.2
  flutter_svg: ^2.0.10+1

  # State Management
  flutter_riverpod: ^2.5.1

  # AI — Gemini (built-in, no Firebase needed)
  google_generative_ai: ^0.4.3

  # Network
  connectivity_plus: ^6.0.5
  http: ^1.2.1

  # Storage
  shared_preferences: ^2.2.3

  # Version info
  package_info_plus: ^8.0.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_dotenv: ^5.1.0
  flutter_tts: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/animations/
    - assets/icons/

# ── App Icon Configuration ─────────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#7C3AED"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  web:
    generate: false
  windows:
    generate: false
